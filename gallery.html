		<!-- Language Switching Script -->
		<script>
			function changeLanguage() {
				const languageSelect = document.getElementById('language-select');
				const selectedLanguage = languageSelect.value;
				
				// Get all elements with data attributes for different languages
				const elements = document.querySelectorAll('[data-en], [data-fr], [data-vi]');
				
				elements.forEach(element => {
					const text = element.getAttribute(`data-${selectedLanguage}`);
					if (text) {
						// Always use innerHTML to preserve HTML tags like <strong>, <em>, <code>, <a>
						element.innerHTML = text;
					}
				});
				
				// Store the selected language in localStorage
				localStorage.setItem('selectedLanguage', selectedLanguage);
			}
			
			// Load saved language preference on page load
			document.addEventListener('DOMContentLoaded', function() {
				const savedLanguage = localStorage.getItem('selectedLanguage');
				if (savedLanguage) {
					document.getElementById('language-select').value = savedLanguage;
					changeLanguage();
				}
			});
		</script>
